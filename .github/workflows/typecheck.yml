name: typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: "npm"
      # .npmrc sets min-release-age=7 as a supply-chain tripwire — but
      # `propline` is our own first-party Node SDK and routinely
      # publishes minutes before we want to consume it from CI. Override
      # for the install step only; the global defense still applies
      # everywhere else. `npm audit --audit-level=high` below is the
      # actual control against compromised versions.
      - run: npm ci --min-release-age=0
      # Fail PR/main on any direct or transitive dep with a known
      # high/critical CVE. Pairs with Dependabot cooldown (waits 7d
      # before opening update PRs).
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run build
